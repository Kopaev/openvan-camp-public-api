<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fuel Price Widget — OpenVan.camp API</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px; background: #f8f9fa; }
    h1 { font-size: 16px; font-weight: 600; color: #333; margin: 0 0 16px; }
    .widget { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.1); padding: 20px; max-width: 500px; }
    .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .controls label { font-size: 13px; color: #666; }
    .controls select { font-size: 13px; border: 1px solid #ddd; border-radius: 6px; padding: 4px 8px; background: #fff; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .5px; padding: 6px 8px; text-align: right; border-bottom: 2px solid #f0f0f0; }
    th:first-child { text-align: left; }
    td { padding: 10px 8px; border-bottom: 1px solid #f5f5f5; font-size: 14px; text-align: right; vertical-align: middle; }
    td:first-child { text-align: left; font-weight: 500; }
    .flag { font-size: 18px; margin-right: 6px; }
    .change-up { color: #e53e3e; font-size: 11px; }
    .change-down { color: #38a169; font-size: 11px; }
    .null-val { color: #ccc; }
    .attribution { font-size: 11px; color: #aaa; margin-top: 12px; text-align: right; }
    .attribution a { color: #4e8097; text-decoration: none; }
    .attribution a:hover { text-decoration: underline; }
    .loading { text-align: center; padding: 30px; color: #999; font-size: 14px; }
    .updated { font-size: 11px; color: #bbb; margin-top: 4px; }
  </style>
</head>
<body>

<div class="widget">
  <div class="controls">
    <label>Currency:
      <select id="currencySelect" onchange="render()">
        <option value="EUR">EUR €</option>
        <option value="USD">USD $</option>
        <option value="GBP">GBP £</option>
        <option value="RUB">RUB ₽</option>
        <option value="TRY">TRY ₺</option>
        <option value="PLN">PLN zł</option>
        <option value="CHF">CHF</option>
      </select>
    </label>
    <label>Unit:
      <select id="unitSelect" onchange="render()">
        <option value="liter">Liter</option>
        <option value="gallon">Gallon</option>
      </select>
    </label>
  </div>
  <div id="content"><div class="loading">Loading…</div></div>
  <div class="attribution">
    Data: <a href="https://openvan.camp/en/tools/fuel-prices" target="_blank">OpenVan.camp</a> · CC BY 4.0
  </div>
</div>

<script>
// === CONFIG: customize which countries to display ===
const COUNTRIES = ['DE', 'FR', 'ES', 'IT', 'PL', 'NO', 'TR', 'US'];

const CURRENCY_SYMBOLS = {
  EUR: '€', USD: '$', GBP: '£', RUB: '₽', TRY: '₺',
  PLN: 'zł', CHF: 'Fr', GEL: '₾', KZT: '₸', UAH: '₴',
  SEK: 'kr', DKK: 'kr', NOK: 'kr',
};

let priceData = null;
let rateData = null;

async function loadData() {
  const [priceRes, rateRes] = await Promise.all([
    fetch('https://openvan.camp/api/fuel/prices'),
    fetch('https://openvan.camp/api/currency/rates'),
  ]);
  priceData = await priceRes.json();
  rateData = await rateRes.json();
  render();
}

function convertPrice(price, fromCurrency, toCurrency, fromUnit, toUnit) {
  if (price === null || price === undefined) return null;
  const rates = rateData.rates;
  // Convert to EUR first
  let p = price / rates[fromCurrency];
  // Convert to target currency
  p = p * rates[toCurrency];
  // Convert unit
  if (fromUnit === 'gallon' && toUnit === 'liter') p = p / 3.78541;
  if (fromUnit === 'liter' && toUnit === 'gallon') p = p * 3.78541;
  return p;
}

function formatChange(change, currency, fromCurrency, toCurrency) {
  if (change === null || change === 0) return '';
  const converted = change / rateData.rates[fromCurrency] * rateData.rates[toCurrency];
  const sym = CURRENCY_SYMBOLS[toCurrency] || toCurrency;
  const sign = converted > 0 ? '+' : '';
  const cls = converted > 0 ? 'change-up' : 'change-down';
  return ` <span class="${cls}">${sign}${converted.toFixed(3)}${sym}</span>`;
}

function render() {
  if (!priceData || !rateData) return;

  const targetCurrency = document.getElementById('currencySelect').value;
  const targetUnit = document.getElementById('unitSelect').value;
  const sym = CURRENCY_SYMBOLS[targetCurrency] || targetCurrency;
  const unitLabel = targetUnit === 'gallon' ? '/gal' : '/L';

  let html = `<table>
    <thead>
      <tr>
        <th>Country</th>
        <th>Gasoline</th>
        <th>Diesel</th>
        <th>LPG</th>
      </tr>
    </thead>
    <tbody>`;

  for (const code of COUNTRIES) {
    const c = priceData.data[code];
    if (!c) continue;

    const fmt = (fuelType) => {
      const p = convertPrice(c.prices[fuelType], c.currency, targetCurrency, c.unit, targetUnit);
      if (p === null) return `<span class="null-val">—</span>`;
      const ch = formatChange(c.price_changes[fuelType], c.unit, c.currency, targetCurrency);
      return `${p.toFixed(3)}${sym}${unitLabel}${ch}`;
    };

    html += `<tr>
      <td><span class="flag">${getFlagEmoji(code)}</span>${c.country_name}</td>
      <td>${fmt('gasoline')}</td>
      <td>${fmt('diesel')}</td>
      <td>${fmt('lpg')}</td>
    </tr>`;
  }

  const updatedAt = priceData.meta.updated_at
    ? new Date(priceData.meta.updated_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
    : '';

  html += `</tbody></table>
    <div class="updated">Updated: ${updatedAt} · ${priceData.meta.total_countries} countries available</div>`;

  document.getElementById('content').innerHTML = html;
}

function getFlagEmoji(countryCode) {
  return countryCode
    .toUpperCase()
    .split('')
    .map(c => String.fromCodePoint(0x1F1E6 - 65 + c.charCodeAt(0)))
    .join('');
}

loadData().catch(err => {
  document.getElementById('content').innerHTML = `<div class="loading">Failed to load data.</div>`;
  console.error(err);
});
</script>

</body>
</html>
