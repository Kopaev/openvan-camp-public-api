# /etc/nginx/sites-enabled/mcp.openvan.camp
#
# Public HTTPS vhost for OpenVan MCP Server (Streamable HTTP).
# TLS is terminated here; upstream is the Node service on 127.0.0.1:4800
# managed by systemd (see deploy/openvan-mcp-sse.service).
#
# Assumes certbot already issued a cert for mcp.openvan.camp — if not:
#   sudo certbot --nginx -d mcp.openvan.camp --non-interactive --agree-tos -m hello@openvan.camp --redirect
#
# After editing:
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name mcp.openvan.camp;

    access_log /var/log/nginx/mcp.openvan.camp-access.log;
    error_log /var/log/nginx/mcp.openvan.camp-error.log;

    # Certbot auto-renewal endpoint
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Force HTTPS for everything else
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name mcp.openvan.camp;

    ssl_certificate     /etc/letsencrypt/live/mcp.openvan.camp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.openvan.camp/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/mcp.openvan.camp-access.log;
    error_log /var/log/nginx/mcp.openvan.camp-error.log;

    # Always-on security + CORS for browser-based MCP clients.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Lightweight landing / healthcheck — served by the Node app directly.
    location = / {
        proxy_pass http://127.0.0.1:4800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:4800;
        access_log off;
    }

    # Streamable HTTP MCP endpoint.
    # Supports POST (JSON-RPC request), GET (SSE stream), DELETE (session close).
    # MCP long-lived streams need buffering off + extended read timeouts.
    location /mcp {
        proxy_pass http://127.0.0.1:4800;
        proxy_http_version 1.1;

        # Critical for SSE: keep connection open, flush byte-by-byte.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering "no" always;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Permissive CORS — public read-only MCP.
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Accept, Mcp-Session-Id, MCP-Protocol-Version" always;
        add_header Access-Control-Expose-Headers "Mcp-Session-Id" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Accept, Mcp-Session-Id, MCP-Protocol-Version" always;
            add_header Content-Length 0;
            add_header Content-Type "text/plain";
            return 204;
        }
    }

    # Reject everything else.
    location / {
        return 404;
    }
}
